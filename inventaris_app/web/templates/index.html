<!DOCTYPE html>
<html>
<head>
    <title>Portofolio Saya</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4f46e5, #06b6d4);
            margin: 0;
            padding: 0;
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 100px;
        }

        .card {
            background: white;
            color: black;
            width: 300px;
            margin: auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        input {
            width: 90%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 10px;
            padding: 10px 20px;
            border: none;
            background: #4f46e5;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #3730a3;
        }
    </style>

</head>

<body>

<div class="container">

    <h1>🚀 Portofolio Developer</h1>
    <p>Website dibuat dengan Flask + Python</p>

    <div class="card">

        <h2>Form Kontak</h2>

        <form action="/submit" method="POST">
            <input type="text" name="nama" placeholder="Nama kamu" required>
            <button type="submit">Kirim</button>
        </form>

    </div>

</div>

</body>
</html>
